name: Update Champion Newsletter

on:
  schedule:
    - cron: "0 12 * * 1"   # every Monday at 12:00 UTC
  workflow_dispatch:        # allow manual runs

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Refresh champion newsletter
        run: node scripts/update-newsletter.mjs

      - name: Commit changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain data/newsletters.json)" ]]; then
            git add data/newsletters.json
            git commit -m "chore: weekly Champion newsletter refresh"
            git push
          else
            echo "No newsletter changes."
          fi
