name: Update Champion Newsletter

on:
  schedule:
    - cron: "30 12 * * 1"   # every Monday at 12:30 UTC (staggered from feeds)
  workflow_dispatch:        # allow manual runs

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Refresh champion newsletter
        run: node scripts/update-newsletter.mjs

      - name: Commit changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [[ -z "$(git status --porcelain data/newsletters.json)" ]]; then
            echo "No newsletter changes."; exit 0
          fi
          git add data/newsletters.json
          git commit -m "chore: weekly Champion newsletter refresh"
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main && git push && exit 0
            echo "Push attempt $i failed; retrying..."; sleep 7
          done
          echo "Push failed after retries"; exit 1