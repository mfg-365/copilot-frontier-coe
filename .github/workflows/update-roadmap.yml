name: Update Copilot Roadmap

on:
  schedule:
    - cron: "0 12 * * 1"   # every Monday 12:00 UTC
  workflow_dispatch:        # allow manual runs

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Refresh roadmap data
        run: node scripts/update-roadmap.mjs

      - name: Commit changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain data/roadmap.json)" ]]; then
            git add data/roadmap.json
            git commit -m "chore: weekly Copilot roadmap refresh"
            git push
          else
            echo "No roadmap changes."
          fi
