name: Update Feeds (Roadmap + Blogs)

on:
  schedule:
    - cron: "0 12 */3 * *"   # every 3 days at 12:00 UTC
  workflow_dispatch:          # allow manual runs

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Refresh roadmap data
        run: node scripts/update-roadmap.mjs

      - name: Refresh blog data
        run: node scripts/update-blogs.mjs

      - name: Commit changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [[ -z "$(git status --porcelain data/roadmap.json data/blogs.json)" ]]; then
            echo "No feed changes."; exit 0
          fi
          git add data/roadmap.json data/blogs.json
          git commit -m "chore: 3-day Copilot roadmap + blog refresh"
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main && git push && exit 0
            echo "Push attempt $i failed; retrying..."; sleep 7
          done
          echo "Push failed after retries"; exit 1