name: Update Feeds (Roadmap + Blogs)

on:
  schedule:
    - cron: "0 12 */3 * *"   # every 3 days at 12:00 UTC
  workflow_dispatch:          # allow manual runs

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Refresh roadmap data
        run: node scripts/update-roadmap.mjs

      - name: Refresh blog data
        run: node scripts/update-blogs.mjs

      - name: Commit changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain data/roadmap.json data/blogs.json)" ]]; then
            git add data/roadmap.json data/blogs.json
            git commit -m "chore: 3-day Copilot roadmap + blog refresh"
            git push
          else
            echo "No feed changes."
          fi
